name: Build, test and release SF32LB52 core

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.actor }}
  cancel-in-progress: true

env:
  HEAD_REF: ${{ github.event.pull_request.head.sha || github.sha }}
  BOARD: sf32lb52devkitlcd
  ZEPHYR_BOARD: sf32lb52_devkit_lcd

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    outputs:
      core_version: ${{ steps.version.outputs.core_version }}
      core_file: ${{ steps.package.outputs.core_file }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false
          fetch-tags: true

      - uses: oven-sh/setup-bun@v2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Install OS dependencies
        run: |
          sudo apt-get remove --purge man-db -y
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git cmake wget python3-pip python3-venv ninja-build \
            ccache rsync zstd jq xz-utils zip unzip tar bzip2

      - name: Test TypeScript tooling
        run: |
          bunx --bun tsc --noEmit
          bun test

      - name: Initialize downstream Zephyr environment
        run: |
          yes | ./extra/bootstrap.sh -o=--filter=tree:0

      - name: Resolve core version
        id: version
        run: |
          CORE_VERSION="$(./extra/get_core_version.sh)"
          echo "core_version=${CORE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "CORE_VERSION=${CORE_VERSION}" >> "$GITHUB_ENV"
          echo "## Building \`${CORE_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Build loader
        run: |
          bun run scripts/ci/build-loader.ts "$BOARD"

      - name: Package core
        id: package
        run: |
          mkdir -p distrib
          CORE_FILE="distrib/ArduinoCore-sf32lb52-${CORE_VERSION}.tar.bz2"
          bun run scripts/ci/package-core.ts --version "$CORE_VERSION" --out "$CORE_FILE"
          echo "core_file=${CORE_FILE}" >> "$GITHUB_OUTPUT"

      - name: Package sftool for local Arduino CLI install
        run: |
          bun run scripts/ci/package-sftool.ts --host x86_64-linux-gnu --out-dir distrib

      - name: Generate local package index
        run: |
          bun run scripts/ci/generate-index.ts \
            --core "${{ steps.package.outputs.core_file }}" \
            --version "$CORE_VERSION" \
            --release-tag "$CORE_VERSION" \
            --asset-base-url "http://127.0.0.1:8765" \
            --github-out distrib/package_sifli_index.json \
            --cn-out distrib/package_sifli_index_cn.json

      - uses: arduino/setup-arduino-cli@v2

      - name: Compile Blink with Arduino CLI
        run: |
          python3 -m http.server 8765 --bind 127.0.0.1 --directory distrib >/tmp/sifli-package-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID"' EXIT

          PACKAGE_SERVER="http://127.0.0.1:8765"
          for _ in {1..10}; do
            wget -qO /dev/null "${PACKAGE_SERVER}/package_sifli_index.json" && break
            sleep 1
          done
          if ! wget -qO /dev/null "${PACKAGE_SERVER}/package_sifli_index.json"; then
            cat /tmp/sifli-package-server.log
            exit 1
          fi

          INDEX_URL="${PACKAGE_SERVER}/package_sifli_index.json"
          arduino-cli config init --overwrite
          arduino-cli core update-index --additional-urls "$INDEX_URL"
          arduino-cli core install sifli:sf32lb52 --additional-urls "$INDEX_URL"
          mkdir -p /tmp/Blink
          cat > /tmp/Blink/Blink.ino <<'EOF'
          void setup() {
            pinMode(LED_BUILTIN, OUTPUT);
          }

          void loop() {
            digitalWrite(LED_BUILTIN, HIGH);
            delay(1000);
            digitalWrite(LED_BUILTIN, LOW);
            delay(1000);
          }
          EOF
          arduino-cli compile --fqbn sifli:sf32lb52:${BOARD}:link_mode=dynamic /tmp/Blink
          arduino-cli compile --fqbn sifli:sf32lb52:${BOARD}:link_mode=static /tmp/Blink

      - name: Archive build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sf32lb52-build-${{ steps.version.outputs.core_version }}
          path: |
            distrib/
            firmwares/zephyr-sf32lb52_devkit_lcd_sf32lb525uc6.*
            variants/sf32lb52_devkit_lcd_sf32lb525uc6/
          retention-days: 7

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-test
    if: ${{ startsWith(github.ref, 'refs/tags/') && github.event_name != 'pull_request' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Install release packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends zip unzip tar xz-utils

      - name: Download core build artifacts
        uses: actions/download-artifact@v8
        with:
          name: sf32lb52-build-${{ needs.build-test.outputs.core_version }}
          path: release-assets

      - name: Build local Arduino tools
        run: |
          bun run scripts/ci/package-tools.ts --out-dir release-assets
          bun run scripts/ci/package-sftool.ts --out-dir release-assets

      - name: Generate release package indexes
        run: |
          CORE_FILE="$(ls release-assets/distrib/ArduinoCore-sf32lb52-*.tar.bz2 | head -n 1)"
          cp "$CORE_FILE" release-assets/
          cp release-assets/firmwares/zephyr-sf32lb52_devkit_lcd_sf32lb525uc6.* release-assets/
          bun run scripts/ci/generate-index.ts \
            --core "release-assets/$(basename "$CORE_FILE")" \
            --version "${{ needs.build-test.outputs.core_version }}" \
            --release-tag "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --tools-dir release-assets \
            --require-local-tools \
            --github-out release-assets/package_sifli_index.json \
            --cn-out release-assets/package_sifli_index_cn.json

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes "SiFli SF32LB52 Arduino Core ${{ needs.build-test.outputs.core_version }}"
          fi
          find release-assets -maxdepth 1 -type f -print0 | \
            xargs -0 gh release upload "${{ github.ref_name }}" --clobber

      - name: Archive release assets
        uses: actions/upload-artifact@v7
        with:
          name: sf32lb52-release-${{ github.ref_name }}
          path: release-assets/
          retention-days: 7

  mirror:
    name: Sync China mirror
    runs-on: ubuntu-latest
    needs:
      - build-test
      - release
    if: ${{ startsWith(github.ref, 'refs/tags/') && github.event_name != 'pull_request' }}
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          name: sf32lb52-release-${{ github.ref_name }}
          path: release-assets

      - name: Upload release assets to COS tag prefix
        uses: OpenSiFli/SiFliMirrorSync@v1
        with:
          secret_id: ${{ secrets.COS_DOWNLOAD_SECRET_ID }}
          secret_key: ${{ secrets.COS_DOWNLOAD_SECRET_KEY }}
          region: ${{ secrets.COS_DOWNLOAD_REGION }}
          bucket: ${{ secrets.COS_DOWNLOAD_BUCKET }}
          prefix: github_assets/${{ github.repository }}/releases/download/${{ github.ref_name }}/
          artifacts: |
            release-assets/*.tar.bz2
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/*.json
            release-assets/*.bin
            release-assets/*.elf
            release-assets/*.hex
            release-assets/*.config
            release-assets/*.dts
          delete_remote: true
          flush_url: https://downloads.sifli.com/github_assets/${{ github.repository }}/releases/download/
          global: true

      - name: Upload release assets to COS latest prefix
        uses: OpenSiFli/SiFliMirrorSync@v1
        with:
          secret_id: ${{ secrets.COS_DOWNLOAD_SECRET_ID }}
          secret_key: ${{ secrets.COS_DOWNLOAD_SECRET_KEY }}
          region: ${{ secrets.COS_DOWNLOAD_REGION }}
          bucket: ${{ secrets.COS_DOWNLOAD_BUCKET }}
          prefix: github_assets/${{ github.repository }}/releases/latest/download/
          artifacts: |
            release-assets/*.tar.bz2
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/*.json
            release-assets/*.bin
            release-assets/*.elf
            release-assets/*.hex
            release-assets/*.config
            release-assets/*.dts
          delete_remote: true
          flush_url: https://downloads.sifli.com/github_assets/${{ github.repository }}/releases/latest/download/
          global: true
