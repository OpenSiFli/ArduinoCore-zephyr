# 4.4.99-oriented minimal variant config for sf32lb52_devkit_lcd.
# Keep this file free from deprecated/removed Kconfig symbols.

CONFIG_BUILD_OUTPUT_BIN=y
CONFIG_BUILD_OUTPUT_HEX=y

CONFIG_LLEXT_STORAGE_WRITABLE=n
CONFIG_STACK_USAGE=n
CONFIG_STACK_SENTINEL=n
CONFIG_STACK_CANARIES=n

# Analog stack now enabled: ADC (PA28..PA34) and PWM (ATIM1/GPTIM2) mapped in
# the variant DTS overlay.
CONFIG_ADC=y
CONFIG_PWM=y
CONFIG_DAC=n
CONFIG_SPI=y
CONFIG_I2C=y

CONFIG_NETWORKING=n
CONFIG_MBEDTLS=n

# Bluetooth LE: expose raw HCI so ArduinoBLE can run its own host in the sketch.
CONFIG_BT=y
CONFIG_BT_HCI_RAW=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_RX_STACK_SIZE=2048

CONFIG_USE_SIFLI_HAL=y

CONFIG_LOG_DEFAULT_LEVEL=4

CONFIG_NVMEM=y
CONFIG_OTP=y
CONFIG_SETTINGS=y

CONFIG_ARM_MPU=y
CONFIG_MPU=y